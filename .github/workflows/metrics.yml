name: 📊 Update Profile Metrics

on:
  # Runs every 6 hours automatically
  schedule:
    - cron: "0 */6 * * *"
  # Runs on every push to main
  push:
    branches:
      - main
  # Allows manual trigger from Actions tab
  workflow_dispatch:

jobs:
  github-metrics:
    name: Refresh GitHub Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Followers & Stars metrics ──────────────────────────────────
      - name: 📈 Followers & Stars
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics-base.svg
          user: Pal2004Subrata
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_padding: 6%, 10%
          config_output: svg
          plugin_followup: yes
          plugin_followup_sections: repositories

      # ── Languages breakdown ────────────────────────────────────────
      - name: 🌐 Languages Used
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics-languages.svg
          user: Pal2004Subrata
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake,
            shell, gnuplot
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          config_timezone: Asia/Kolkata

      # ── Achievements ───────────────────────────────────────────────
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics-achievements.svg
          user: Pal2004Subrata
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: X
          config_timezone: Asia/Kolkata

      # ── Recent activity ────────────────────────────────────────────
      - name: ⚡ Recent Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics-activity.svg
          user: Pal2004Subrata
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_timestamps: yes
          config_timezone: Asia/Kolkata
